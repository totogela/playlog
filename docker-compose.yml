services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gaming_profile
      POSTGRES_USER: gamer
      POSTGRES_PASSWORD: gamer_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamer -d gaming_profile"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
